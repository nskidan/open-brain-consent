<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Brain - Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
    h1 { font-size: 1.4rem; text-align: center; margin-bottom: .25rem; }
    .subtitle { text-align: center; color: #94a3b8; font-size: .85rem; margin-bottom: 1.75rem; }
    label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: .35rem; }
    input { width: 100%; padding: .65rem .75rem; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: .95rem; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: .7rem; border: none; border-radius: 8px; background: #6366f1; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .error { color: #f87171; font-size: .85rem; text-align: center; margin-bottom: 1rem; display: none; }
    .status { color: #94a3b8; font-size: .85rem; text-align: center; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open Brain</h1>
    <p class="subtitle">Sign in to connect</p>
    <div id="error" class="error"></div>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <button type="submit" id="btn">Sign In</button>
    </form>
    <p id="status" class="status"></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var sb = supabase.createClient(
      "https://hrmfalgllvulavmhfhkn.supabase.co",
      "sb_publishable_3epCF1Urmpbwu5T1aMPXmQ_wzMWVCBc"
    );
    var params = new URLSearchParams(location.search);
    var authId = params.get("authorization_id");
    var form = document.getElementById("form");
    var btn = document.getElementById("btn");
    var errEl = document.getElementById("error");
    var statusEl = document.getElementById("status");

    function showErr(msg) { errEl.textContent = msg; errEl.style.display = "block"; }
    function showStatus(msg) { statusEl.textContent = msg; statusEl.style.display = "block"; }

    async function approve() {
      showStatus("Approving connection...");
      var res = await sb.auth.oauth.approveAuthorization(authId);
      if (res.error) { showErr("Approval failed: " + res.error.message); btn.disabled = false; return; }
      if (res.data && res.data.redirect_to) { window.location.href = res.data.redirect_to; }
    }

    // Check if already logged in
    (async function() {
      if (!authId) { showErr("Missing authorization_id - open this page from Claude Desktop."); return; }
      var sess = await sb.auth.getSession();
      if (sess.data.session) { form.style.display = "none"; showStatus("Already signed in - approving..."); await approve(); }
    })();

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      errEl.style.display = "none";
      btn.disabled = true;
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      var res = await sb.auth.signInWithPassword({ email: email, password: password });
      if (res.error) { showErr(res.error.message); btn.disabled = false; return; }
      await approve();
    });
  </script>
</body>
</html>
