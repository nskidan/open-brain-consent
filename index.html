<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Brain - Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
    h1 { font-size: 1.4rem; text-align: center; margin-bottom: .25rem; }
    .subtitle { text-align: center; color: #94a3b8; font-size: .85rem; margin-bottom: 1.75rem; }
    label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: .35rem; }
    input { width: 100%; padding: .65rem .75rem; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: .95rem; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: .7rem; border: none; border-radius: 8px; background: #6366f1; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .error { color: #f87171; font-size: .85rem; text-align: center; margin-bottom: 1rem; display: none; }
    .status { color: #94a3b8; font-size: .85rem; text-align: center; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Open Brain</h1>
    <p class="subtitle">Sign in to connect</p>
    <div id="error" class="error"></div>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <button type="submit" id="btn">Sign In</button>
    </form>
    <p id="status" class="status"></p>
  </div>
  <script>
    var APPROVE_URL = "https://hrmfalgllvulavmhfhkn.supabase.co/functions/v1/open-brain-mcp/oauth/approve";
    var params = new URLSearchParams(location.search);
    var authId = params.get("authorization_id");
    var form = document.getElementById("form");
    var btn = document.getElementById("btn");
    var errEl = document.getElementById("error");
    var statusEl = document.getElementById("status");

    function showErr(msg) { errEl.textContent = msg; errEl.style.display = "block"; }
    function showStatus(msg) { statusEl.textContent = msg; statusEl.style.display = "block"; }

    (function() {
      if (!authId) { showErr("Missing authorization_id - open this page from Claude Desktop."); }
    })();

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      errEl.style.display = "none";
      btn.disabled = true;
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;

      showStatus("Signing in...");
      try {
        var res = await fetch(APPROVE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: password, authorization_id: authId })
        });
        var data = await res.json();
        if (!res.ok) { showErr(data.error || "Sign in failed"); btn.disabled = false; statusEl.style.display = "none"; return; }
        if (data.redirect_to) { showStatus("Success! Redirecting..."); window.location.href = data.redirect_to; }
      } catch (err) {
        showErr("Connection error: " + err.message);
        btn.disabled = false;
        statusEl.style.display = "none";
      }
    });
  </script>
</body>
</html>
